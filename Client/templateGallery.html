<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link
      class="taskbar-icon"
      rel="icon"
      type="image/png"
      href="./assets/images/Untitled design - 2025-09-01T183547.741.png"
    />
    <link rel="stylesheet" href="./assets/css/index.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <img
          src="./assets/images/Untitled design - 2025-09-01T183547.741.png"
          alt="Logo"
          class="logo-img"
        />
        PCM Automation
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="templateGallery.html">Template Gallery</a></li>
        <li><a href="campaign_management.html">Campaign Management</a></li>
      </ul>
      <div class="hamburger" id="hamburger">☰</div>
    </nav>

    <div class="container">
      <!-- <h2>Choose and Customize Your Template</h2> -->
      <div class="templates-grid" id="templatesGrid"></div>
    </div>

    <!-- All your modals here -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Edit Letter Template</h3>
          <button class="close" onclick="closeEditModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div
            class="modal-letter-container"
            id="letterEditor"
            contenteditable="true"
            spellcheck="false"
          ></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeEditModal()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveTemplate()">
            Save Template
          </button>
          <button class="btn btn-primary" onclick="openSaveAsNewModal()">
            Save as New Template
          </button>
        </div>
      </div>
    </div>

    <!-- Other modals... -->
    <div id="saveAsNewModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Save as New Template</h3>
          <button class="close" onclick="closeSaveAsNewModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="templateName">Template Name:</label>
            <input
              type="text"
              id="templateName"
              class="form-input"
              placeholder="Enter template name..."
              maxlength="50"
            />
          </div>
          <div class="preview-section">
            <div class="template-preview" id="newTemplatePreview"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeSaveAsNewModal()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveAsNewTemplate()">
            Save New Template
          </button>
        </div>
      </div>
    </div>

    <div id="successModal" class="modal-overlay">
      <div class="modal-box">
        <h2>🎉 Success!</h2>
        <p>Your order has been placed successfully.</p>
        <div class="modal-buttons">
          <button class="btn-primary" onclick="closeModal()">OK</button>
        </div>
      </div>
    </div>

    <div id="templateCreatedModal" class="modal-overlay">
      <div class="modal-box">
        <h2>✅ Template Created!</h2>
        <p id="templateCreatedMessage">
          Your new template has been created successfully.
        </p>
        <div class="modal-buttons">
          <button class="btn-primary" onclick="closeTemplateCreatedModal()">
            OK
          </button>
        </div>
      </div>
    </div>

    <div id="alertModal" class="custom-modal" style="display: none">
      <div class="custom-modal-content">
        <div id="alertMessage" class="custom-modal-text"></div>
        <button id="alertOkBtn" class="custom-modal-ok-btn">OK</button>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="custom-modal" style="display: none">
      <div class="custom-modal-content">
        <div id="confirmMessage" class="custom-modal-text"></div>
        <div>
          <button
            id="confirmYesBtn"
            class="custom-modal-ok-btn"
            style="background-color: #dc3545"
          >
            Yes
          </button>
          <button
            id="confirmNoBtn"
            class="custom-modal-ok-btn"
            style="background-color: #6c757d"
          >
            No
          </button>
        </div>
      </div>
    </div>
    <!-- Regular JavaScript -->
    <script src="./assets/js/script.js"></script>
  </body>
  <script>
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.querySelector(".nav-links");

    // Toggle menu when hamburger clicked
    hamburger.addEventListener("click", (e) => {
      e.stopPropagation(); // prevent triggering document click
      navLinks.classList.toggle("nav-active");
    });

    // Close menu if clicking outside
    document.addEventListener("click", (e) => {
      if (
        navLinks.classList.contains("nav-active") &&
        !navLinks.contains(e.target) &&
        e.target !== hamburger
      ) {
        navLinks.classList.remove("nav-active");
      }
    });
  </script>
</html>
