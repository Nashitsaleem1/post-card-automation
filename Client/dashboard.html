<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="./assets/css/index.css" />
    <link
      class="taskbar-icon"
      rel="icon"
      type="image/png"
      href="./assets/images/Untitled design - 2025-09-01T183547.741.png"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <img
          src="./assets/images/Untitled design - 2025-09-01T183547.741.png"
          alt="Logo"
          class="logo-img"
        />
        PCM Automation
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="templateGallery.html">Template Gallery</a></li>
        <li><a href="campaign_management.html">Campaign Management</a></li>
      </ul>
      <div class="hamburger" id="hamburger">☰</div>
    </nav>

    <!-- Dashboard content -->
    <main class="dashboard">
      <!-- <h1>Dashboard</h1> -->
      <div class="cards">
        <div class="card">
          <h3>Total Campaigns</h3>
          <p id="totalCampaigns">0</p>
        </div>
        <div class="card">
          <h3>Latest Campaign</h3>
          <p id="latestCampaign">Loading...</p>
        </div>
        <div class="card">
          <h3>Total Recipients</h3>
          <p id="totalRecipients">0</p>
        </div>
      </div>

      <div id="templateModal" class="modal2">
        <div class="modal-content2">
          <span class="close-template">&times;</span>
          <h2>Template Preview</h2>
          <div
            id="templateContent"
            style="
              border: 1px solid #ddd;
              padding: 10px;
              background: #fafafa;
              overflow: auto;
              max-height: 400px;
            "
          ></div>
        </div>
      </div>

      <!-- Campaign data table will be injected here -->
    </main>
    <div id="campaignModal2" class="modal2">
      <div class="modal-content2">
        <span class="close">&times;</span>
        <h2 id="modalCampaignName"></h2>
        <p><strong>Mailer:</strong> <span id="modalMailerName"></span></p>

        <div style="margin-top: 10px">
          <label>
            <input type="checkbox" id="filterScanned" />
            Show only scanned addresses
          </label>
        </div>

        <div id="modalAddresses" class="address-list"></div>
      </div>
    </div>
    <script src="./assets/js/dashboard.js"></script>
    <script src="./assets/js/script.js"></script>
  </body>
  <script>
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.querySelector(".nav-links");

    // Toggle menu when hamburger clicked
    hamburger.addEventListener("click", (e) => {
      e.stopPropagation(); // prevent triggering document click
      navLinks.classList.toggle("nav-active");
    });

    // Close menu if clicking outside
    document.addEventListener("click", (e) => {
      if (
        navLinks.classList.contains("nav-active") &&
        !navLinks.contains(e.target) &&
        e.target !== hamburger
      ) {
        navLinks.classList.remove("nav-active");
      }
    });
  </script>
</html>
